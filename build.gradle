plugins {
    id 'java'
    id 'application'
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.slf4j:slf4j-api:2.0.12'
    implementation 'ch.qos.logback:logback-classic:1.4.14'
}

application {
    mainClass = 'Main'
}

run {
    standardInput = System.in
    systemProperty 'logback.configurationFile', 'logback.xml'
}